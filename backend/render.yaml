services:
  - type: web
    name: financeflow-api
    env: node
    region: ohio
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: financeflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: https://financeflow.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: financeflow-db
    databaseName: financeflow
    plan: free
    region: ohio
    postgresMajorVersion: 16
